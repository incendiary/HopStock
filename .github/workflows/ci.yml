name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: ESLint (client)
        run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build client
        run: npm run build

  docker-smoke:
    name: Docker smoke test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t hopstock-ci .

      - name: Start container
        run: |
          mkdir -p /tmp/hopstock-data
          docker run -d \
            --name hopstock-ci \
            -p 3000:3000 \
            -v /tmp/hopstock-data:/data \
            hopstock-ci

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://localhost:3000/api/health > /dev/null; then
              echo "Server ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Server did not become ready in 15s"
          docker logs hopstock-ci
          exit 1

      - name: Health check
        run: |
          RESPONSE=$(curl -sf http://localhost:3000/api/health)
          echo "$RESPONSE"
          echo "$RESPONSE" | grep -q '"status":"ok"'

      - name: API responds with empty equipment list
        run: |
          RESPONSE=$(curl -sf http://localhost:3000/api/equipment)
          echo "$RESPONSE"
          echo "$RESPONSE" | grep -q '"items"'

      - name: Data directory created on host
        run: |
          test -f /tmp/hopstock-data/hopstock.db && echo "DB created on host" || (echo "DB not found on host" && exit 1)

      - name: Stop container
        if: always()
        run: docker rm -f hopstock-ci
