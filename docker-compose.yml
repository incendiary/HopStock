services:
  hopstock:
    image: ghcr.io/incendiary/hopstock:latest
    ports:
      - "3000:3000"
    volumes:
      # Bind-mount a host directory so data survives image updates and is
      # easy to back up. Change the host path to suit your setup.
      # Proxmox recommended: /opt/hopstock/data
      - /opt/hopstock/data:/data
    environment:
      PORT: "3000"
      # Uncomment to enable receipt scanning:
      # ANTHROPIC_API_KEY: "sk-ant-..."
      # Backup settings (defaults shown):
      # BACKUP_INTERVAL_HOURS: "24"
      # BACKUP_KEEP: "7"
    restart: unless-stopped
